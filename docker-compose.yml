services:
  connector:
    build:
      context: .
      dockerfile: docker/Dockerfile
      args:
        # Vite embeds this public value in the console bundle during `docker compose build`.
        VITE_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-}
    volumes:
      - connector-data:/app/data
    environment:
      OOMOL_CONNECT_DATA_DIR: /app/data
      OOMOL_CONNECT_ORIGIN: https://connections.fractals-solutions.com
      OOMOL_CONNECT_ENCRYPTION_KEY:
      CLERK_SECRET_KEY:
      CLERK_PUBLISHABLE_KEY:
      CLERK_WEBHOOK_SIGNING_SECRET:
      DATABASE_URL:
      OOMOL_CONNECT_ALLOWED_ACTIONS:
      OOMOL_CONNECT_BLOCKED_ACTIONS:
      OOMOL_CONNECT_ALLOWED_PROXIES:
      OOMOL_CONNECT_BLOCKED_PROXIES:

volumes:
  connector-data:
